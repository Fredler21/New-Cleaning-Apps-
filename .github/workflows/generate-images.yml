name: Generate Post Images

# Manually generate any missing post cover images with Gemini (candid style)
# and commit them. The generator skips images that already exist, so this only
# creates covers for posts that do not have one yet. Uses the GEMINI_API_KEY
# secret already configured on the repo.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate ALL images, even ones that already exist"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "image-bot[bot]"
          git config user.email "image-bot@users.noreply.github.com"

      - name: Generate images (candid)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            npm run generate:images:candid -- --force
          else
            npm run generate:images:candid
          fi

      - name: Commit and push new images
        run: |
          git add public/uploads public/graphics
          if git diff --cached --quiet; then
            echo "No new images were generated; nothing to commit."
          else
            git commit -m "Generate cover images for new posts (candid)"
            git push
          fi
