<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="TryCleaningHacks logo mark">
  <defs>
    <linearGradient id="droplet-grad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="shine-grad" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Droplet body -->
  <path
    d="M24 5 C17 11 8 19 8 30 A16 16 0 0 1 40 30 C40 19 31 11 24 5Z"
    fill="url(#droplet-grad)"
  />

  <!-- Inner radial shine for depth -->
  <path
    d="M24 5 C17 11 8 19 8 30 A16 16 0 0 1 40 30 C40 19 31 11 24 5Z"
    fill="url(#shine-grad)"
  />

  <!-- 4-point sparkle star centered at 24,27 -->
  <path
    d="M24 21.5 L25.5 25.5 L29.5 27 L25.5 28.5 L24 32.5 L22.5 28.5 L18.5 27 L22.5 25.5 Z"
    fill="white"
    opacity="0.95"
  />

  <!-- Small highlight dot upper-left (gloss) -->
  <circle cx="17" cy="15" r="2.5" fill="white" opacity="0.3"/>
</svg>
